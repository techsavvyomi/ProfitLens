<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <title>ProfitLens - EMI</title>
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark')</script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </div>
      <h1>Expense Tracker</h1>
      <p>Enter your PIN to continue</p>
      <form id="loginForm">
        <input type="password" id="pinInput" placeholder="Enter PIN" inputmode="numeric" autocomplete="off" required>
        <button type="submit">Login</button>
      </form>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- App Content -->
  <div id="appContent" style="display:none">
    <section class="page-section">
      <div class="page-header">
        <div class="page-header-text">
          <h1>EMI Tracker</h1>
          <p>Track your loan repayment progress</p>
        </div>
        <div class="page-header-actions">
          <button class="refresh-btn" id="refreshBtn" title="Refresh data">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          </button>
        </div>
      </div>

      <!-- Notification Banner -->
      <div id="notificationBanner" class="notification-banner hidden"></div>

      <!-- Add EMI Form -->
      <div class="add-form-card" id="addEmiFormCard">
        <button type="button" class="add-toggle-btn" id="toggleEmiForm">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add New EMI
        </button>
        <form id="emiForm" class="add-form hidden" autocomplete="off">
          <input type="text" id="emiName" placeholder="Loan Name" required>
          <div class="form-row">
            <input type="number" id="emiLoanAmount" placeholder="Loan Amount" inputmode="decimal" required>
            <input type="number" id="emiAmount" placeholder="Monthly EMI" inputmode="decimal" required>
          </div>
          <div class="form-row">
            <input type="date" id="emiStartDate" required>
            <input type="number" id="emiTenure" placeholder="Tenure (months)" inputmode="numeric" required>
          </div>
          <div class="form-row">
            <input type="number" id="emiDeductionDay" placeholder="Deduction day (1-31)" inputmode="numeric" min="1" max="31">
            <select id="emiAccount">
              <option value="">Debit Account</option>
            </select>
          </div>
          <button type="submit" class="submit-btn" id="emiSubmitBtn">Add EMI</button>
          <div class="submit-status" id="emiStatus"></div>
        </form>
      </div>

      <div id="emiCards" class="emi-grid">
        <div class="loading">Loading EMI data...</div>
      </div>
    </section>
    <div class="nav-spacer"></div>

    <!-- Edit EMI Modal -->
    <div class="modal-overlay hidden" id="editEmiModal">
      <div class="modal-card">
        <h3>Edit EMI</h3>
        <form id="editEmiForm">
          <input type="hidden" id="editEmiIndex">
          <div class="form-row single">
            <input type="text" id="editEmiName" placeholder="Loan Name" required>
          </div>
          <div class="form-row">
            <input type="number" id="editEmiLoanAmount" placeholder="Loan Amount" inputmode="decimal" required>
            <input type="number" id="editEmiAmount" placeholder="Monthly EMI" inputmode="decimal" required>
          </div>
          <div class="form-row">
            <input type="date" id="editEmiStartDate" required>
            <input type="number" id="editEmiTenure" placeholder="Tenure (months)" inputmode="numeric" required>
          </div>
          <div class="form-row">
            <input type="number" id="editEmiDeductionDay" placeholder="Deduction day (1-31)" inputmode="numeric" min="1" max="31">
            <select id="editEmiAccount">
              <option value="">Debit Account</option>
            </select>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary" id="editEmiCancel">Cancel</button>
            <button type="submit" class="submit-btn" id="editEmiSave">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" id="bottomNav" style="display:none">
    <a href="index.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="emi.html" class="nav-item active">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      <span>EMI</span>
    </a>
    <a href="investments.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Invest</span>
    </a>
  </nav>

  <script type="module" src="js/emiPage.js"></script>
</body>
</html>
